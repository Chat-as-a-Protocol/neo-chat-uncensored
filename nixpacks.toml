# Nixpacks configuration for NΞØ Protocol
# Resolve UndefinedVar: $NIXPACKS_PATH by explicitly defining the setup phase.

[phases.setup]
nixPkgs = ["nodejs_22", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm dlx serve dist -l $PORT"
