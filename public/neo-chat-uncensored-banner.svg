<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with deep depth -->
  <rect width="1200" height="420" fill="#050608"/>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1117"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#D7FF64" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#D7FF64" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#mainGrad)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- Top Glow Line -->
  <rect width="1200" height="2" fill="url(#glowGrad)"/>

  <!-- Main Frame -->
  <rect x="20" y="20" width="1160" height="380" rx="24" stroke="#D7FF64" stroke-opacity="0.1" stroke-width="1"/>

  <!-- LEFT SECTION: BRANDING & STATUS -->
  <g transform="translate(60, 65)">
    <!-- Brand Icon (Refined) -->
    <g>
      <circle cx="45" cy="45" r="45" fill="#0D0E14" stroke="#D7FF64" stroke-opacity="0.4" stroke-width="1.5"/>
      <path d="M30 30 L60 60 M60 30 L30 60" stroke="#D7FF64" stroke-width="10" stroke-linecap="square" />
      <rect x="40" y="40" width="10" height="10" fill="#050608" />
      <circle cx="45" cy="45" r="4" fill="#D7FF64" />
    </g>
    
    <!-- Brand Name -->
    <g transform="translate(120, 5)">
      <text y="40" fill="#D7FF64" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" letter-spacing="-0.05em">NØX</text>
      <text x="155" y="40" fill="#FFFFFF" fill-opacity="0.9" font-family="Inter, sans-serif" font-size="32" font-weight="300" letter-spacing="-0.02em">PROTOCOL</text>
      <rect y="55" width="280" height="24" rx="4" fill="#D7FF64" fill-opacity="0.1" />
      <text x="10" y="73" fill="#D7FF64" font-family="ui-monospace, monospace" font-size="14" font-weight="700" letter-spacing="0.1em">STATUS: PRODUCTION · v4.2.0</text>
    </g>
  </g>

  <!-- CENTER SECTION: HARDENED SPECS -->
  <g transform="translate(60, 190)">
    <!-- Security Box -->
    <rect width="520" height="140" rx="16" fill="#08090D" stroke="#D7FF64" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="1" y="1" width="518" height="40" rx="15 15 0 0" fill="#D7FF64" fill-opacity="0.03" />
    
    <text x="25" y="27" fill="#D7FF64" font-family="ui-monospace, monospace" font-size="14" font-weight="800">HARDENED INFRASTRUCTURE</text>
    
    <g transform="translate(25, 65)">
      <text y="0" fill="#FFFFFF" fill-opacity="0.85" font-family="Inter, sans-serif" font-size="18" font-weight="600">Auth Token Precedence</text>
      <text y="28" fill="#FFFFFF" fill-opacity="0.5" font-family="Inter, sans-serif" font-size="14">Predictive Billing + Safety Buffers</text>
      
      <text y="60" fill="#FFFFFF" fill-opacity="0.85" font-family="Inter, sans-serif" font-size="18" font-weight="600">Ledger-First Accounting</text>
      <text y="88" fill="#FFFFFF" fill-opacity="0.5" font-family="Inter, sans-serif" font-size="14">Deterministic Ledger Protection</text>
    </g>
  </g>

  <!-- RIGHT SECTION: CONNECTIVITY -->
  <g transform="translate(610, 190)">
    <rect width="530" height="140" rx="16" fill="#0A0B10" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    
    <g transform="translate(30, 40)">
      <text fill="#6EE7F9" font-family="ui-monospace, monospace" font-size="14" font-weight="700">NETWORK BOUNDARIES</text>
      <g transform="translate(0, 35)">
        <text y="0" fill="#FFFFFF" fill-opacity="0.7" font-family="ui-monospace, monospace" font-size="16">DOMAIN: noxai.chat</text>
        <text y="25" fill="#FFFFFF" fill-opacity="0.7" font-family="ui-monospace, monospace" font-size="16">API: api.noxai.chat</text>
        <text y="50" fill="#FFFFFF" fill-opacity="0.7" font-family="ui-monospace, monospace" font-size="16">FLOWPAY: api.flowpay.cash</text>
      </g>
    </g>
    
    <!-- Verified Badge -->
    <g transform="translate(380, 45)">
      <path d="M0 15 L15 0 L45 0 L60 15 L60 45 L45 60 L15 60 L0 45 Z" fill="#D7FF64" fill-opacity="0.1" stroke="#D7FF64" stroke-opacity="0.3"/>
      <path d="M15 30 L25 40 L45 20" stroke="#D7FF64" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- BOTTOM SECTION: STACK -->
  <g transform="translate(60, 370)">
    <text fill="#FFFFFF" fill-opacity="0.3" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="0.3em">POWERED BY NΞØ · FLOWPAY · VENICE · PWA CACHE · RAILWAY</text>
    <rect x="520" y="-12" width="100" height="1" fill="#FFFFFF" fill-opacity="0.1"/>
    <text x="640" y="0" fill="#D7FF64" font-family="Inter, sans-serif" font-size="14" font-weight="800">UNRESTRICTED ACCESS · SECURE LEDGER</text>
  </g>
</svg>
