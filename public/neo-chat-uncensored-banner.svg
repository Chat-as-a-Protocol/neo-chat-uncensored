<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="420" fill="#0A0B10"/>
  
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1B23"/>
      <stop offset="1" stop-color="#0A0B10"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#mainGrad)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- Main Border -->
  <rect x="20" y="20" width="1160" height="380" rx="20" stroke="#D7FF64" stroke-opacity="0.15" stroke-width="2"/>

  <!-- TOP SECTION: BRAND -->
  <g transform="translate(60, 60)">
    <!-- Brand Icon -->
    <g transform="translate(0, 0)">
      <circle cx="40" cy="40" r="40" fill="#16171D" stroke="#D7FF64" stroke-opacity="0.3" stroke-width="2"/>
      <path d="M25 25 L55 55 M55 25 L25 55" stroke="#D7FF64" stroke-width="8" stroke-linecap="round" />
      <circle cx="40" cy="40" r="10" fill="#D7FF64" />
    </g>
    
    <!-- Brand Name -->
    <g transform="translate(110, 0)">
      <text y="35" fill="#D7FF64" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" letter-spacing="-0.04em">NØX CHAT</text>
      <text y="70" fill="#FFFFFF" fill-opacity="0.7" font-family="Inter, sans-serif" font-size="22" font-weight="500">Uncensored AI Protocol Interface</text>
    </g>
  </g>

  <!-- MIDDLE SECTION: TECH INFO & STATS -->
  <!-- Tech Box -->
  <g transform="translate(60, 180)">
    <rect width="500" height="130" rx="14" fill="#0D0E14" stroke="#FFFFFF" stroke-opacity="0.08" />
    <text x="25" y="40" fill="#6EE7F9" font-family="ui-monospace, monospace" font-size="18" font-weight="700">INFRASTRUCTURE BOUNDARY</text>
    <text x="25" y="75" fill="#FFFFFF" fill-opacity="0.8" font-family="ui-monospace, monospace" font-size="18">APP: noxai.chat</text>
    <text x="25" y="105" fill="#FFFFFF" fill-opacity="0.4" font-family="ui-monospace, monospace" font-size="16">API: api.noxai.chat · GATE: flowpay.cash</text>
  </g>

  <!-- Stats Box -->
  <g transform="translate(640, 180)">
    <rect width="500" height="130" rx="14" fill="#111218" stroke="#D7FF64" stroke-opacity="0.2" stroke-width="2" />
    <text x="30" y="40" fill="#D7FF64" font-family="Inter, sans-serif" font-size="18" font-weight="800">CORE CAPABILITIES</text>
    <g transform="translate(30, 75)">
      <text x="0" y="0" fill="#FFFFFF" fill-opacity="0.8" font-family="Inter, sans-serif" font-size="16">◈ Sovereign Auth</text>
      <text x="170" y="0" fill="#FFFFFF" fill-opacity="0.8" font-family="Inter, sans-serif" font-size="16">◈ Token Ledger</text>
      <text x="340" y="0" fill="#FFFFFF" fill-opacity="0.8" font-family="Inter, sans-serif" font-size="16">◈ Native Pay</text>
    </g>
    <circle cx="465" cy="35" r="8" fill="#D7FF64" />
  </g>

  <!-- BOTTOM SECTION: PROJECT NAME -->
  <g transform="translate(60, 355)">
    <text fill="#FFFFFF" font-family="Inter, sans-serif" font-size="42" font-weight="900" letter-spacing="-0.04em">neo-chat-uncensored</text>
    <text x="460" y="-5" fill="#6EE7F9" fill-opacity="0.5" font-family="Inter, sans-serif" font-size="16" font-weight="600" letter-spacing="0.2em">MOBILE-FIRST · P.R.O TIER · AUDITED</text>
  </g>
</svg>
