user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Upstream para o backend Express Node.js na rede privada do Railway
    upstream backend {
        server backend.railway.internal:3001;
    }

    server {
        listen 3000;
        server_name _;

        # Healthcheck do Railway e teste de pulso operacional
        location = /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bloqueia requisições suspeitas - corta a conexão sem resposta (444)
        location ~* ^/(\.env|\.git|\.aws|wp-admin|admin|config\.php|wp-login|\.htaccess|\.well-known/acme-challenge) {
            access_log off;
            return 444;
        }

        # Bloqueia scrapers e bots maliciosos (mas permite curl/wget para diagnóstico do operador)
        if ($http_user_agent ~* (aiohttp|scrapy|python-requests|crawler|spider)) {
            return 444;
        }

        # Proxy para o backend principal
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
